<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>회원가입 — DAEYANG 전자세금계산서</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/htweb/images/blue-a-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/htweb/images/blue-a-16.png" />
    <link rel="apple-touch-icon" href="/htweb/images/blue-a-192.png" />
    <link rel="stylesheet" href="/htweb/css/style.css" />
  </head>
  <body class="no-sidebar">
    <div class="wrap">
      <div class="card login-box">
        <div class="login-logo-area">
          <img src="/htweb/images/logo-color.png" alt="대양기업 로고" class="login-logo" />
          <p class="login-logo-sub">전자세금계산서 시스템</p>
        </div>
        <h2>회원가입</h2>
        <form id="register-form">
          <div class="field">
            <label for="name">이름</label>
            <input id="name" name="name" autocomplete="name" placeholder="이름 입력" />
          </div>
          <div class="field">
            <label for="username">아이디</label>
            <input id="username" name="username" autocomplete="username" placeholder="영문·숫자·_·- (3~50자)" required />
          </div>
          <div class="field">
            <label for="password">비밀번호</label>
            <input id="password" type="password" name="password" autocomplete="new-password" placeholder="비밀번호 입력" required />
          </div>
          <div class="field">
            <label for="confirm">비밀번호 확인</label>
            <input id="confirm" type="password" name="confirm" autocomplete="new-password" placeholder="비밀번호 재입력" required />
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top: 14px; width: 100%">가입하기</button>
          <p id="register-error" class="error-msg" style="display: none"></p>
        </form>
        <div class="login-footer-links">
          <span>이미 계정이 있으신가요?</span>
          <a href="/htweb/login.html">로그인</a>
        </div>
      </div>
    </div>

    <script src="/htweb/js/common.js"></script>
    <script src="/htweb/js/register.js"></script>
  </body>
</html>
