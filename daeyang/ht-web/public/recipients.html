    <div class="wrap">
      <div class="card">
        <div class="recipients-admin-toolbar">
          <div class="recipients-toolbar-left">
            <form id="excel-import-form" class="excel-inline">
              <input
                id="excel-file"
                type="file"
                accept=".xlsx,.xls,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
                style="display:none"
              />
              <button type="button" class="btn btn-secondary" id="btn-excel-file-pick" style="background:#e2e8f0;">파일 선택</button>
              <span class="hint" id="excel-file-name" style="margin-top:0; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
              <input type="hidden" name="import-mode-holder" id="import-mode" value="merge" />
              <button type="submit" class="btn btn-excel-outline">엑셀 가져오기</button>
            </form>
            <a class="btn btn-excel" id="btn-export-excel" href="/htweb/api/recipients/export-excel">엑셀 내보내기</a>
            <span id="excel-import-result" class="hint"></span>
          </div>
          <div class="recipients-toolbar-right">
            <button type="button" class="btn btn-primary" id="btn-new-recipient">공급받는자 추가</button>
          </div>
        </div>
      </div>

      <div class="recipients-admin-main">
        <div class="card recipients-form-panel">
          <div class="panel-title-row">
            <h2 id="recipient-form-title">공급받는자 추가 · 수정</h2>
            <div class="panel-title-actions">
              <button type="button" class="btn btn-primary" id="btn-save-recipient" title="저장">저장</button>
              <button type="button" class="btn btn-secondary" id="btn-copy-recipient" title="복사" style="display:none">복사</button>
              <button
                type="button"
                class="btn btn-danger"
                id="btn-delete-recipient"
                title="삭제"
                style="display: none"
              >
                삭제
              </button>
            </div>
          </div>
          <form id="recipient-form">
            <input type="hidden" id="edit-recipient-id" value="" />
            <div class="row">
              <div class="field">
                <label for="new-kind">구분</label>
                <select id="new-kind">
                  <option value="individual">개인</option>
                  <option value="business">사업자</option>
                  <option value="foreign">외국인</option>
                </select>
              </div>
              <div class="field" id="wrap-biz-subtype">
                <label for="new-bizSubtype">사업자 세부</label>
                <select id="new-bizSubtype">
                  <option value="sole">개인사업자</option>
                  <option value="corp">법인</option>
                  <option value="nonprofit">비영리</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="new-displayName">상호</label>
              <input id="new-displayName" required />
            </div>
            <div class="row">
              <div class="field">
                <label for="new-receptionCapacity">수전용량</label>
                <div class="input-suffix-wrap">
                  <input id="new-receptionCapacity" type="number" min="0" step="0.001" placeholder="0" />
                  <span class="input-suffix">kW</span>
                </div>
              </div>
              <div class="field">
                <label for="new-generationCapacity">태양광용량</label>
                <div class="input-suffix-wrap">
                  <input id="new-generationCapacity" type="number" min="0" step="0.001" placeholder="0" />
                  <span class="input-suffix">kW</span>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label for="new-bizNo">등록번호</label>
                <input id="new-bizNo" />
              </div>
              <div class="field">
                <label for="new-ceoName">대표자명</label>
                <input id="new-ceoName" />
              </div>
            </div>
            <div class="field">
              <label for="new-address">주소</label>
              <input id="new-address" />
            </div>
            <div class="row">
              <div class="field">
                <label for="new-contactPhone">연락처</label>
                <input id="new-contactPhone" type="tel" inputmode="numeric" placeholder="숫자만 입력" autocomplete="tel" />
              </div>
              <div class="field">
                <label for="new-email">이메일</label>
                <input id="new-email" type="email" />
              </div>
            </div>
            <div id="wrap-rec-biz-meta" class="row" style="display: none">
              <div class="field">
                <label for="new-bizType">업태</label>
                <input id="new-bizType" placeholder="예: 도매 및 소매업" />
              </div>
              <div class="field">
                <label for="new-bizItem">종목</label>
                <input id="new-bizItem" placeholder="예: 전기" />
              </div>
            </div>
            <div class="row" style="align-items: flex-start;">
              <div class="field">
                <label>계약 서비스</label>
                <div class="svc-check-group">
                  <label class="svc-check-label">
                    <input type="checkbox" id="svc-safety" />
                    안전관리
                  </label>
                  <label class="svc-check-label">
                    <input type="checkbox" id="svc-tax" />
                    세무
                  </label>
                  <label class="svc-check-label">
                    <input type="checkbox" id="svc-billing" />
                    청구
                  </label>
                  <label class="svc-check-label">
                    <input type="checkbox" id="svc-monitoring" />
                    모니터링
                  </label>
                </div>
                <div id="monitoring-type-wrap" style="display:none; margin-top:8px; padding:10px 12px; background:var(--bg-sub,#f8fafc); border-radius:6px; border:1px solid var(--line,#e2e8f0);">
                  <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
                    <span class="monitoring-kind-label">종류</span>
                    <select id="monitoring-type-select" style="flex:1; min-width:120px; max-width:200px;"></select>
                    <button type="button" class="btn btn-secondary" id="btn-add-monitoring-option" style="white-space:nowrap;">+ 직접 추가</button>
                    <button type="button" class="btn btn-danger" id="btn-del-monitoring-option" style="display:none; white-space:nowrap;">삭제</button>
                  </div>
                  <div id="monitoring-custom-wrap" style="display:none; margin-top:8px; gap:6px; align-items:center;">
                    <input type="text" id="monitoring-custom-input" placeholder="새 모니터링 종류 이름" style="flex:1;" maxlength="100" />
                    <button type="button" class="btn btn-primary" id="btn-save-monitoring-option">저장</button>
                    <button type="button" class="btn btn-secondary" id="btn-cancel-monitoring-option">취소</button>
                  </div>
                </div>
              </div>
              <div class="field">
                <label for="new-paymentMethod">결제방식</label>
                <select id="new-paymentMethod">
                  <option value="">선택</option>
                  <option value="자동이체(CMS)">자동이체(CMS)</option>
                  <option value="직접송금">직접송금</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="new-internalMemo">메모</label>
              <textarea
                id="new-internalMemo"
                rows="3"
                maxlength="500"
                placeholder="전자세금계산서에는 표시되지 않습니다."
              ></textarea>
            </div>
            <div class="field">
              <label>사업자등록증</label>
              <div class="biz-cert-area" id="recipient-cert-area"></div>
              <input id="recipient-cert-file" type="file" accept="application/pdf,.pdf,.jpg,.jpeg,.png" style="display:none" />
            </div>
          </form>

          <div id="items-editor-wrap" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line)">
            <div class="panel-title-row panel-title-row-sub">
              <h3 style="font-size: 0.95rem; margin: 0">발전소 및 품목</h3>
              <div class="panel-title-actions">
                <button type="button" class="btn btn-secondary btn-symbol" id="btn-add-item" title="품목 추가">+</button>
              </div>
            </div>
            <table class="data-table recipients-table-compact" id="items-table">
              <colgroup>
                <col span="10" /><col style="width:52px" />
              </colgroup>
              <tbody id="items-tbody"></tbody>
            </table>
          </div>
        </div>

        <div class="card recipients-list-panel">
          <div class="panel-title-row recipients-list-title-row">
            <h2 style="margin: 0">공급받는자 목록</h2>
            <div class="panel-title-actions">
              <button type="button" class="btn btn-secondary" id="btn-recipient-select-all">전체선택</button>
              <button type="button" class="btn btn-danger" id="btn-recipient-delete-selected">삭제</button>
            </div>
          </div>
          <div class="row" style="align-items: flex-start; margin-bottom: 8px">
            <div class="field recipient-search-field">
              <label for="recipient-admin-search">검색</label>
              <input type="search" id="recipient-admin-search" placeholder="이름, 등록번호, 연락처, 주소…" autocomplete="off" />
              <div class="search-col-chips" id="recipient-search-col-chips">
                <button type="button" class="search-col-chip active" data-col="all">전체</button>
                <button type="button" class="search-col-chip" data-col="name">상호</button>
                <button type="button" class="search-col-chip" data-col="owner">사업주</button>
                <button type="button" class="search-col-chip" data-col="bizno">등록번호</button>
                <button type="button" class="search-col-chip" data-col="phone">연락처</button>
                <button type="button" class="search-col-chip" data-col="plant">발전소</button>
              </div>
            </div>
            <div class="field" style="flex: 0 1 240px">
              <label for="recipient-admin-kind-filter">구분</label>
              <select id="recipient-admin-kind-filter">
                <option value="">전체</option>
                <option value="individual">개인</option>
                <option value="business:sole">사업자(개인사업자)</option>
                <option value="business:corp">사업자(법인사업자)</option>
                <option value="business:nonprofit">사업자(비영리)</option>
                <option value="foreign">외국인</option>
              </select>
            </div>
          </div>
          <p class="hint" id="recipient-admin-filter-count" style="margin-top: -4px; margin-bottom: 6px"></p>
          <div class="table-scroll">
            <table class="data-table recipients-table-compact">
              <thead>
                <tr>
                  <th class="recipient-col-check" title="선택"></th>
                  <th>발전소</th>
                  <th style="width:80px">사업주</th>
                  <th style="width:90px">구분</th>
                  <th style="width:56px; text-align:center">품목 수</th>
                  <th style="width:230px">서비스</th>
                  <th style="width:110px">결제방식</th>
                  <th style="width:52px; text-align:center">메모</th>
                </tr>
              </thead>
              <tbody id="recipient-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div id="excel-conflict-modal" class="modal-overlay" style="display:none">
      <div class="modal-box" style="max-width:520px;width:95vw">
        <div class="modal-header">
          <h3 class="modal-title">품목 등록 방식 선택</h3>
        </div>
        <p class="modal-message">동일 사업자에 여러 발전소(품목)가 있습니다. 어떻게 등록할까요?</p>
        <div id="excel-conflict-list" style="max-height:220px;overflow-y:auto;margin-bottom:14px;font-size:0.85rem;border:1px solid var(--line);border-radius:6px;padding:8px 12px"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="excel-conflict-cancel">취소</button>
          <button type="button" class="btn btn-primary" id="excel-conflict-confirm">확인</button>
        </div>
      </div>
    </div>

    <script src="/htweb/js/common.js"></script>
    <script src="/htweb/js/recipients.js"></script>
  </body>
</html>
