    <div class="wrap">
      <div class="card">
        <div class="admin-page-header">
          <h2>사용자 관리</h2>
          <span class="admin-badge">ADMIN</span>
        </div>

        <!-- 탭 -->
        <div class="admin-tabs">
          <button type="button" class="admin-tab active" data-tab="list">사용자 목록</button>
          <button type="button" class="admin-tab" data-tab="add">사용자 추가</button>
        </div>

        <!-- 목록 탭 -->
        <div id="tab-list">
          <div class="admin-toolbar">
            <div class="field" style="flex: 1 1 220px; max-width: 320px; margin: 0;">
              <input id="user-search" type="search" placeholder="아이디·이름 검색…" />
            </div>
            <span id="admin-user-count" class="hint" style="margin: 0; white-space: nowrap;"></span>
          </div>

          <div class="table-scroll" style="margin-top: 14px;">
            <table class="data-table admin-user-table" id="admin-user-table">
              <thead>
                <tr>
                  <th>아이디</th>
                  <th>이름</th>
                  <th style="width: 110px; text-align: center;">권한</th>
                  <th style="width: 160px;">가입일시</th>
                  <th style="width: 160px;">변경일시</th>
                </tr>
              </thead>
              <tbody id="admin-user-tbody">
                <tr><td colspan="5" style="text-align:center; color: var(--text-muted);">불러오는 중…</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- 사용자 추가 탭 -->
        <div id="tab-add" style="display:none;">
          <form id="admin-add-form" style="max-width: 460px; margin-top: 14px;">
            <div class="row">
              <div class="field">
                <label for="add-name">이름</label>
                <input id="add-name" type="text" placeholder="이름 입력" />
              </div>
              <div class="field">
                <label for="add-username">아이디 <span style="color:var(--danger);">*</span></label>
                <input id="add-username" type="text" placeholder="영문·숫자·_·- (3~50자)" required />
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label for="add-password">비밀번호 <span style="color:var(--danger);">*</span></label>
                <input id="add-password" type="password" placeholder="비밀번호 입력 (4자 이상)" required />
              </div>
              <div class="field">
                <label for="add-confirm">비밀번호 확인 <span style="color:var(--danger);">*</span></label>
                <input id="add-confirm" type="password" placeholder="비밀번호 재입력" required />
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label for="add-role">권한</label>
                <select id="add-role">
                  <option value="user">USER (일반)</option>
                  <option value="admin">ADMIN (관리자)</option>
                </select>
              </div>
            </div>
            <p id="add-error" class="error-msg" style="display:none;"></p>
            <div style="margin-top: 6px;">
              <button type="submit" class="btn btn-primary">사용자 추가</button>
            </div>
          </form>
        </div>

      </div>
    </div>

    <!-- 사용자 상세/편집 모달 -->
    <div id="user-modal" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="user-modal-title">
      <div class="modal-box admin-detail-modal">

        <div class="um-header">
          <h3 id="user-modal-title" class="modal-title">사용자 정보</h3>
          <button type="button" class="btn btn-danger btn-sm" id="um-del-btn">삭제</button>
        </div>

        <table class="admin-info-table">
          <tbody>
            <tr><th>ID</th><td id="um-id"></td></tr>
            <tr><th>아이디</th><td id="um-username"></td></tr>
            <tr>
              <th><label for="um-name-input">이름</label></th>
              <td><input id="um-name-input" type="text" placeholder="이름 입력" class="um-field-input" /></td>
            </tr>
            <tr>
              <th><label for="um-role-select">권한</label></th>
              <td>
                <select id="um-role-select" class="um-field-input">
                  <option value="user">USER (일반)</option>
                  <option value="admin">ADMIN (관리자)</option>
                  <option value="pending">대기 (승인 전)</option>
                </select>
              </td>
            </tr>
            <tr>
              <th><label for="um-lock-select">계정 잠금</label></th>
              <td>
                <select id="um-lock-select" class="um-field-input">
                  <option value="normal">정상</option>
                  <option value="locked">잠금</option>
                </select>
              </td>
            </tr>
            <tr><th>가입일시</th><td id="um-created"></td></tr>
            <tr><th>변경일시</th><td id="um-updated"></td></tr>
            <tr>
              <th><label for="um-pw-input">새 비밀번호</label></th>
              <td><input id="um-pw-input" type="password" placeholder="변경 시에만 입력" autocomplete="new-password" class="um-field-input" /></td>
            </tr>
            <tr>
              <th><label for="um-pw-input2">비밀번호 확인</label></th>
              <td><input id="um-pw-input2" type="password" placeholder="비밀번호 재입력" autocomplete="new-password" class="um-field-input" /></td>
            </tr>
          </tbody>
        </table>

        <p id="um-save-error" class="error-msg" style="display:none; margin-top:6px;"></p>
        <p id="um-self-note" class="hint" style="display:none; margin-top: 8px; text-align:center;">내 계정은 권한·잠금 변경 및 삭제가 불가합니다.</p>

        <div class="modal-actions" style="margin-top: 18px; border-top: 1px solid var(--line); padding-top: 14px;">
          <button type="button" class="btn btn-secondary" id="user-modal-close">닫기</button>
          <button type="button" class="btn btn-secondary" id="um-data-btn">데이터 관리</button>
          <button type="button" class="btn btn-primary"   id="um-save-btn">저장</button>
        </div>
      </div>
    </div>

    <!-- 데이터 관리 모달 -->
    <div id="data-modal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
      <div class="modal-box" style="max-width:900px; width:96vw; max-height:88vh; display:flex; flex-direction:column;">
        <div class="um-header">
          <h3 id="data-modal-title" class="modal-title">데이터 관리</h3>
          <button type="button" class="btn btn-secondary btn-sm" id="data-modal-close">닫기</button>
        </div>
        <div class="admin-tabs" style="margin-top:12px; flex-shrink:0;">
          <button class="admin-tab active" data-dtab="suppliers">공급자</button>
          <button class="admin-tab" data-dtab="recipients">공급받는자</button>
        </div>
        <div style="overflow-y:auto; flex:1; margin-top:10px; padding-right:2px;">
          <div id="dtab-suppliers"></div>
          <div id="dtab-recipients" style="display:none;"></div>
        </div>
      </div>
    </div>

    <!-- 수정 모달 (공급자 / 공급받는자 / 품목 공용) -->
    <div id="edit-modal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
      <div class="modal-box" style="max-width:520px; width:95vw;">
        <h3 id="edit-modal-title" class="modal-title" style="margin-bottom:14px;">수정</h3>
        <div id="edit-modal-fields"></div>
        <p id="edit-modal-error" class="error-msg" style="display:none; margin-top:6px;"></p>
        <div class="modal-actions" style="margin-top:16px; border-top:1px solid var(--line); padding-top:12px;">
          <button type="button" class="btn btn-secondary" id="edit-modal-cancel">취소</button>
          <button type="button" class="btn btn-primary"   id="edit-modal-save">저장</button>
        </div>
      </div>
    </div>

    <script src="/htweb/js/common.js"></script>
    <script src="/htweb/js/admin.js"></script>
  </body>
