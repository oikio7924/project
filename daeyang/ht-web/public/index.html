    <div class="wrap dashboard-page">
      <div class="dash-notice-strip" id="dash-notice-strip">
        <strong class="dash-notice-line" id="dash-notice-line">(공지 없음)</strong>
      </div>
      <div class="card card-dash-main">
        <h2>대시보드</h2>
        <div class="dash-period-dual" id="dash-period-cards"></div>
      </div>

      <div class="card card-dash-side-a">
        <h2>요약</h2>
        <div class="dash-summary" id="dash-summary-strip"></div>
      </div>

      <div class="card card-dash-full">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <h2 style="margin:0">최근 발행 기록</h2>
          <button type="button" class="btn btn-secondary" id="btn-dash-detail" style="font-size:0.78rem;padding:3px 10px">상세보기</button>
        </div>
        <div class="table-scroll dash-recent-scroll">
          <table class="data-table" id="dash-recent-table">
            <thead>
              <tr>
                <th>저장일시</th>
                <th>귀속월</th>
                <th>공급받는자</th>
                <th>공급가액</th>
                <th>세액</th>
                <th>합계</th>
                <th>전송상태</th>
              </tr>
            </thead>
            <tbody id="dash-recent-body"></tbody>
          </table>
        </div>
        <p class="hint" id="dash-recent-empty" style="display: none"></p>
      </div>
    </div>

    <div id="dash-summary-modal" class="modal-overlay" style="display:none">
      <div class="modal-box" style="max-width:700px;width:95vw">
        <div class="modal-header">
          <h3 class="modal-title">이번 달 현황</h3>
          <button type="button" class="modal-close-btn" id="dash-summary-modal-close">✕</button>
        </div>
        <div id="dash-summary-tabs" class="dash-sum-tabs">
          <button type="button" class="dash-sum-tab" data-tab="all">총건수</button>
          <button type="button" class="dash-sum-tab" data-tab="transmitted">전송완료</button>
          <button type="button" class="dash-sum-tab" data-tab="failed">전송실패</button>
          <button type="button" class="dash-sum-tab" data-tab="pending">발행대기</button>
        </div>
        <div class="table-scroll" style="max-height:60vh">
          <table class="data-table" id="dash-summary-table">
            <thead id="dash-summary-thead"></thead>
            <tbody id="dash-summary-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="dash-amount-modal" class="modal-overlay" style="display:none">
      <div class="modal-box" style="max-width:420px;width:95vw">
        <div class="modal-header">
          <h3 class="modal-title">이번 달 금액 현황</h3>
          <button type="button" class="modal-close-btn" id="dash-amount-modal-close">✕</button>
        </div>
        <div id="dash-amount-tabs" class="dash-sum-tabs">
          <button type="button" class="dash-sum-tab" data-tab="all">합계</button>
          <button type="button" class="dash-sum-tab" data-tab="transmitted">전송완료</button>
          <button type="button" class="dash-sum-tab" data-tab="failed">전송실패</button>
        </div>
        <div id="dash-amount-body" class="dash-amount-body"></div>
      </div>
    </div>

    <div id="dash-detail-modal" class="modal-overlay" style="display:none">
      <div class="modal-box" style="max-width:1300px;width:98vw">
        <div class="modal-header">
          <h3 class="modal-title">최근 발행 기록 (상세)</h3>
          <button type="button" class="modal-close-btn" id="dash-detail-close">✕</button>
        </div>
        <div class="table-scroll" style="max-height:70vh">
          <table class="data-table" id="dash-detail-table">
            <thead>
              <tr>
                <th>발행ID</th>
                <th>저장일시</th>
                <th>귀속월</th>
                <th>공급받는자</th>
                <th>공급가액</th>
                <th>세액</th>
                <th>합계</th>
                <th>전송상태</th>
                <th>오류내용</th>
              </tr>
            </thead>
            <tbody id="dash-detail-body"></tbody>
          </table>
        </div>
      </div>
    </div>
