<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>사용 승인 대기 — 전자세금계산서</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/htweb/images/blue-a-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/htweb/images/blue-a-16.png" />
    <link rel="apple-touch-icon" href="/htweb/images/blue-a-192.png" />
    <link rel="stylesheet" href="/htweb/css/style.css" />
  </head>
  <body class="no-sidebar">
    <div class="pending-page-wrap">
      <div class="pending-card">
        <div class="pending-logo-area">
          <img src="/htweb/images/logo-color.png" alt="로고" class="pending-logo" />
        </div>

        <div class="pending-spinner"></div>

        <h2 class="pending-title">사용 승인이 진행중입니다.</h2>
        <p class="pending-desc">
          회원가입이 완료되었습니다.<br />
          관리자 승인 후 서비스를 이용하실 수 있습니다.<br />
          승인 완료 후 아래 링크를 통해 로그인해 주세요.
        </p>

        <div class="pending-footer">
          <a href="/htweb/login.html" id="logout-link">로그인 페이지로 돌아가기</a>
        </div>
      </div>
    </div>

    <script src="/htweb/js/common.js"></script>
    <script>
      document.getElementById("logout-link").addEventListener("click", async function (e) {
        e.preventDefault();
        try { await apiSend("/api/logout", "POST"); } catch (_) {}
        window.location.href = "/login.html";
      });
    </script>
  </body>
</html>
