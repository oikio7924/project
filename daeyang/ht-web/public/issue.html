    <div class="wrap issue-layout">
      <div class="issue-top-bar no-print">
        <div class="issue-top-bar-dates">
          <div class="field issue-top-field">
            <label for="issue-date">작성일자</label>
            <input id="issue-date" type="date" />
          </div>
          <div class="field issue-top-field">
            <label for="issue-year-month">귀속 날짜</label>
            <input id="issue-year-month" type="month" />
          </div>
          <span class="issue-top-main-btns">
            <button type="button" class="btn btn-primary" id="btn-hometax" disabled>전송</button>
            <button type="button" class="btn btn-secondary" id="btn-print">인쇄</button>
          </span>
        </div>
        <div class="issue-top-bar-meta">
          <p id="issue-status-msg" class="hint issue-top-msg"></p>
          <p id="preview-error" class="error-msg issue-top-error" style="display: none"></p>
        </div>
      </div>

      <div class="issue-split">
        <div class="card issue-session-col no-print">
          <div class="issue-session-header-row">
            <h2>발행 목록</h2>
          </div>
          <div class="issue-session-toolbar">
            <div class="row issue-options-list-controls issue-session-list-controls">
              <div class="field" style="flex: 2 1 200px">
                <label for="issue-session-search">목록 검색</label>
                <input type="search" id="issue-session-search" autocomplete="off" placeholder="이름·사업자번호 등" />
              </div>
              <div class="field issue-session-filter-field">
                <label for="issue-kind-filter">구분</label>
                <select id="issue-kind-filter">
                  <option value="">전체</option>
                  <option value="individual">개인</option>
                  <option value="sole">개인사업자</option>
                  <option value="corp">법인사업자</option>
                  <option value="nonprofit">비영리법인</option>
                  <option value="foreign">외국인</option>
                </select>
              </div>
              <div class="field issue-session-filter-field">
                <label for="issue-transmit-filter">전송상태</label>
                <select id="issue-transmit-filter">
                  <option value="">전체</option>
                  <option value="not_sent">미전송</option>
                  <option value="pending">발행대기</option>
                  <option value="transmitted">전송완료</option>
                  <option value="failed">전송실패</option>
                </select>
              </div>
            </div>
            <div class="issue-chips-btns-row">
              <div class="search-col-chips" id="issue-search-col-chips">
                <button type="button" class="search-col-chip active" data-col="all">전체</button>
                <button type="button" class="search-col-chip" data-col="name">상호</button>
                <button type="button" class="search-col-chip" data-col="owner">사업주</button>
                <button type="button" class="search-col-chip" data-col="bizno">등록번호</button>
                <button type="button" class="search-col-chip" data-col="phone">연락처</button>
                <button type="button" class="search-col-chip" data-col="plant">발전소</button>
              </div>
              <div class="issue-options-action-row">
                <span class="issue-options-select-btns-inner">
                  <button type="button" class="btn btn-primary" id="btn-save-pending">저장</button>
                  <button type="button" class="btn btn-secondary" id="btn-select-all">전체 선택</button>
                  <button type="button" class="btn btn-secondary" id="btn-select-pending">미전송 선택</button>
                  <button type="button" class="btn btn-secondary" id="btn-select-none">선택해제</button>
                </span>
              </div>
            </div>
            <div class="hint issue-session-filter-line">
              <span id="issue-session-filter-count"></span>
              <span class="issue-totals-group">
                <span id="issue-list-total"></span>
                <span id="issue-selected-total"></span>
              </span>
            </div>
          </div>
          <div class="session-list-wrap">
            <table class="data-table issue-session-table">
              <thead>
                <tr>
                  <th class="issue-session-th-select">선택</th>
                  <th>공급받는자</th>
                  <th>발전소</th>
                  <th>사업주</th>
                  <th>합계</th>
                  <th>전송상태</th>
                </tr>
              </thead>
              <tbody id="issue-session-body">
                <tr>
                  <td colspan="6" style="color: var(--text-muted)">목록이 없습니다.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="card issue-invoice-pane">
          <div class="issue-invoice-header-row no-print">
            <h2 class="issue-invoice-heading">전자세금계산서</h2>
            <div id="invoice-toolbar" class="issue-invoice-toolbar no-print">
              <div class="invoice-pager">
                <button type="button" class="btn btn-secondary" id="btn-inv-prev">이전</button>
                <span id="invoice-page-label" class="hint" style="margin: 0"></span>
                <button type="button" class="btn btn-secondary" id="btn-inv-next">다음</button>
              </div>
            </div>
          </div>
          <div id="preview-single" class="issue-preview-single"></div>
        </div>
      </div>
    </div>

    <script src="/htweb/js/common.js"></script>
