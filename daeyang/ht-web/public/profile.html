    <div class="wrap">
      <div class="card">
        <h2>내 계정</h2>
        <div class="row">
          <div class="field">
            <label for="profile-username">아이디</label>
            <input id="profile-username" readonly />
          </div>
          <div class="field">
            <label for="profile-active-supplier">현재 발행 공급자</label>
            <input id="profile-active-supplier" readonly />
          </div>
        </div>
      </div>

      <div class="card">
        <h2>비밀번호 변경</h2>
        <form id="password-form">
          <div class="row">
            <div class="field">
              <label for="pw-current">현재 비밀번호</label>
              <input id="pw-current" type="password" autocomplete="current-password" />
            </div>
            <div class="field">
              <label for="pw-new">새 비밀번호</label>
              <input id="pw-new" type="password" autocomplete="new-password" />
            </div>
            <div class="field">
              <label for="pw-new-confirm">새 비밀번호 확인</label>
              <input id="pw-new-confirm" type="password" autocomplete="new-password" />
            </div>
          </div>
          <p style="margin-top: 4px">
            <button type="submit" class="btn btn-primary">비밀번호 저장</button>
            <span class="hint" id="pw-msg" style="margin-left: 8px"></span>
          </p>
        </form>
      </div>

      <div class="card">
        <h2>내 공지</h2>
        <p class="hint">메인 페이지 상단에 표시되며, Enter(줄바꿈) 기준으로 5초마다 전환됩니다.</p>
        <div class="field">
          <label for="profile-notice-text">공지 내용</label>
          <textarea
            id="profile-notice-text"
            rows="5"
            maxlength="1000"
            placeholder="공지를 입력해주세요."
            spellcheck="false"
            autocorrect="off"
            autocapitalize="off"
            data-gramm="false"
          ></textarea>
        </div>
        <p style="margin-top: 6px">
          <button type="button" class="btn btn-secondary" id="profile-save-notice">공지 저장</button>
          <span class="hint" id="profile-notice-msg" style="margin-left: 8px"></span>
        </p>
      </div>
    </div>
