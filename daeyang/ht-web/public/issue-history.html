    <div class="wrap">
      <div class="card history-matrix-card">
        <h2>연도별 월 전송현황</h2>
        <div class="history-matrix-toolbar">
          <div class="history-matrix-year-nav-row">
            <div class="history-matrix-year-nav">
              <button type="button" class="btn btn-secondary" id="btn-year-prev">이전연도</button>
              <strong id="matrix-year-label" style="margin: 0 10px"></strong>
              <button type="button" class="btn btn-secondary" id="btn-year-next">다음연도</button>
            </div>
          </div>

          <div class="history-search-panel">
            <div class="history-search-controls">
              <div class="field" style="flex: 2 1 200px">
                <label for="matrix-recipient-search">검색</label>
                <input id="matrix-recipient-search" type="search" placeholder="이름 검색" autocomplete="off" />
              </div>
              <div class="field">
                <label for="matrix-kind-filter">구분</label>
                <select id="matrix-kind-filter">
                  <option value="">전체</option>
                  <option value="individual">개인</option>
                  <option value="business:sole">개인사업자</option>
                  <option value="business:corp">법인사업자</option>
                  <option value="business:nonprofit">비영리법인</option>
                  <option value="foreign">외국인</option>
                </select>
              </div>
              <div class="field">
                <label>합계</label>
                <div class="history-total-display" id="matrix-total-amount">—</div>
              </div>
              <div class="field">
                <label>발행일자</label>
                <div class="date-parts-input">
                  <input id="filter-date" type="text" inputmode="numeric" maxlength="10" placeholder="YYYYMMDD" class="date-part date-part-single" autocomplete="off" />
                  <button type="button" class="date-pick-btn" id="btn-date-picker" aria-label="달력 선택">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  </button>
                  <input type="date" id="filter-date-picker" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;" tabindex="-1" />
                </div>
              </div>
            </div>
            <div class="history-chips-meta-row">
              <div class="search-col-chips" id="history-search-col-chips">
                <button type="button" class="search-col-chip active" data-col="all">전체</button>
                <button type="button" class="search-col-chip" data-col="name">상호</button>
                <button type="button" class="search-col-chip" data-col="owner">사업주</button>
                <button type="button" class="search-col-chip" data-col="bizno">등록번호</button>
                <button type="button" class="search-col-chip" data-col="phone">연락처</button>
                <button type="button" class="search-col-chip" data-col="plant">발전소</button>
              </div>
              <div class="history-matrix-meta">
                <span class="hint" id="matrix-count"></span>
                <span class="hint">○ 전송완료 / △ 발행대기 / ✕ 전송실패 / - 미발행</span>
              </div>
            </div>
          </div>
        </div>
        <div class="table-scroll">
          <table class="data-table history-matrix-table">
            <thead>
              <tr>
                <th>공급받는자</th>
                <th>비고</th>
                <th>총 금액</th>
                <th>공급가액</th>
                <th>1월</th>
                <th>2월</th>
                <th>3월</th>
                <th>4월</th>
                <th>5월</th>
                <th>6월</th>
                <th>7월</th>
                <th>8월</th>
                <th>9월</th>
                <th>10월</th>
                <th>11월</th>
                <th>12월</th>
              </tr>
            </thead>
            <tbody id="matrix-body">
              <tr>
                <td colspan="16" style="color: var(--text-muted)">데이터를 불러오는 중입니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
