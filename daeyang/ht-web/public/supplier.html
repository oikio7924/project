    <div class="wrap">
      <div class="card">
        <h2>공급자 목록</h2>
        <p class="hint" id="supplier-active-label"></p>
        <div class="table-scroll">
          <table class="data-table" id="supplier-list-table">
            <thead>
              <tr>
                <th>발행 사용</th>
                <th style="width: 56px">번호</th>
                <th>상호(법인명)</th>
                <th>등록번호</th>
                <th>작업</th>
              </tr>
            </thead>
            <tbody id="supplier-list-body"></tbody>
          </table>
        </div>
        <div class="supplier-list-pagination" id="supplier-list-pagination" style="display: none">
          <button type="button" class="btn btn-secondary" id="supplier-page-prev">이전</button>
          <span class="hint" id="supplier-page-info"></span>
          <button type="button" class="btn btn-secondary" id="supplier-page-next">다음</button>
        </div>
        <p style="margin-top: 12px">
          <button type="button" class="btn btn-secondary" id="btn-add-supplier">공급자 추가</button>
        </p>
      </div>

      <form id="supplier-form" class="supplier-form-page">
        <div class="supplier-form-split">
          <div class="card supplier-form-col">
            <div class="panel-title-row">
              <h2 id="supplier-form-heading" style="margin:0">공급자 편집</h2>
              <div class="panel-title-actions">
                <button type="submit" class="btn btn-primary">저장</button>
                <span id="save-msg" class="hint"></span>
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label for="bizNo">등록번호</label>
                <input id="bizNo" placeholder="숫자만 입력" />
              </div>
              <div class="field">
                <label for="corpName">상호(법인명)</label>
                <input id="corpName" />
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label for="ceoName">성명</label>
                <input id="ceoName" />
              </div>
              <div class="field">
                <label for="phone">연락처</label>
                <input id="phone" type="tel" inputmode="numeric" placeholder="숫자만 입력" autocomplete="tel" />
              </div>
            </div>
            <div class="field">
              <label for="email">이메일</label>
              <input id="email" type="email" />
            </div>
            <div class="field">
              <label for="address">사업장 주소</label>
              <input id="address" />
            </div>
            <div class="row">
              <div class="field">
                <label for="bizType">업태</label>
                <input id="bizType" placeholder="예: 전기업" />
              </div>
              <div class="field">
                <label for="bizItem">종목</label>
                <input id="bizItem" placeholder="예: 태양광발전" />
              </div>
            </div>
            <div class="field">
              <label>사업자등록증</label>
              <div class="biz-cert-area" id="supplier-cert-area"></div>
              <input id="supplier-cert-file" type="file" accept="application/pdf,.pdf,.jpg,.jpeg,.png" style="display:none" />
            </div>
          </div>
          <div class="card supplier-form-col supplier-contact-card">
            <h2>담당자</h2>
            <div class="field">
              <label for="contactDept">부서</label>
              <select id="contactDept">
                <option value="">부서 선택</option>
                <option value="경영지원부">경영지원부</option>
                <option value="사업개발부">사업개발부</option>
                <option value="기술부">기술부</option>
                <option value="기업부설연구소">기업부설연구소</option>
              </select>
            </div>
            <div class="field">
              <label for="contactName">이름</label>
              <input id="contactName" placeholder="담당자 성명" autocomplete="name" />
            </div>
            <div class="row supplier-contact-phone-row">
              <div class="field">
                <label for="contactPhone">연락처</label>
                <input id="contactPhone" type="tel" inputmode="numeric" placeholder="담당자 연락처" autocomplete="tel" />
              </div>
              <div class="field">
                <label for="contactExtension">내선</label>
                <select id="contactExtension">
                  <option value="">내선 선택</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="contactEmailLocal">이메일</label>
              <div class="contact-email-split">
                <input id="contactEmailLocal" type="text" placeholder="아이디" autocomplete="email" />
                <span class="contact-email-at" aria-hidden="true">@</span>
                <select id="contactEmailDomainSelect">
                  <option value="">도메인 선택</option>
                  <option value="dycompany.co.kr">dycompany.co.kr</option>
                  <option value="naver.com">naver.com</option>
                  <option value="hanmail.net">hanmail.net</option>
                  <option value="gmail.com">gmail.com</option>
                  <option value="custom">직접 입력</option>
                </select>
              </div>
              <input
                id="contactEmailDomainCustom"
                class="contact-email-domain-custom"
                type="text"
                placeholder="도메인 직접 입력"
                autocomplete="off"
                style="display: none"
              />
            </div>
          </div>
        </div>
      </form>
    </div>
